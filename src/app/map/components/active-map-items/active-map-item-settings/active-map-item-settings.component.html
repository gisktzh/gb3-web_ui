<div class="active-map-item-settings">
  <!-- Opacity -->
  <slider-wrapper title="Deckvermögen" [value]="formattedCurrentOpacity()" minValue="0%" maxValue="100%">
    <ng-container content>
      <mat-slider [min]="0" [max]="1" [step]="0.01" color="primary" class="active-map-item-settings__transparency__slider">
        <input matSliderThumb [(ngModel)]="currentOpacity" />
      </mat-slider>
    </ng-container>
  </slider-wrapper>

  <!-- Time slider -->
  @if (gb2WmsActiveMapItemWithTimeslider(); as gb2WmsActiveMapItemWithTimeslider) {
    <mat-divider class="active-map-item-settings__divider" />
    <time-slider
      [initialTimeExtent]="gb2WmsActiveMapItemWithTimeslider.settings.timeSliderExtent!"
      [timeSliderConfiguration]="gb2WmsActiveMapItemWithTimeslider.settings.timeSliderConfiguration!"
      (changeTimeExtentEvent)="onTimeSliderExtentChange($event)"
    />
  }

  <!-- Attribute filter -->
  @if (hasAttributeFilter()) {
    <mat-divider class="active-map-item-settings__divider" />
    <div class="active-map-item-settings__attribute-filter">
      @if (numberOfChangedFilters() > 0) {
        <p class="active-map-item-settings__attribute-filter__badge" [matBadge]="numberOfChangedFilters()" matBadgePosition="before"></p>
      }
      <button class="active-map-item-settings__attribute-filter__button" mat-button (click)="showMapAttributeFilters()">
        <mat-icon>east</mat-icon>
        <strong>Attributfilter</strong>
      </button>
    </div>
  }
</div>
