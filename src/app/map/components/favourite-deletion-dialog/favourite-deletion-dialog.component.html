<api-dialog-wrapper [savingState]="savingState()" title="Favorit löschen" (closeEvent)="close()">
  <ng-container content>
    Das Löschen des Favoriten <em>"{{ data.favourite.title }}"</em> kann <strong>nicht</strong> rückgängig gemacht werden.
  </ng-container>
  <ng-container actions>
    <button (click)="close()" [disabled]="savingState() === 'loading'" mat-button>Abbrechen</button>
    <button (click)="delete()" [disabled]="savingState() === 'loading'" mat-button>Löschen</button>
  </ng-container>
</api-dialog-wrapper>
