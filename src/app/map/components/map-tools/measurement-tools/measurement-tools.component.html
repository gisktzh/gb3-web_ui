<div class="measurement-tools">
  <button
    (click)="togglePointMeasurement()"
    [class.measurement-tools__button--active]="activeTool() === 'measure-point'"
    class="measurement-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.pointMeasurement"
    [aria-label]="tooltipText.pointMeasurement"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_point" />
  </button>
  <button
    (click)="toggleLineMeasurement()"
    [class.measurement-tools__button--active]="activeTool() === 'measure-line'"
    class="measurement-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.lineMeasurement"
    [aria-label]="tooltipText.lineMeasurement"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_line" />
  </button>
  <button
    (click)="toggleAreaMeasurement()"
    [class.measurement-tools__button--active]="activeTool() === 'measure-area'"
    class="measurement-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.areaMeasurement"
    [aria-label]="tooltipText.areaMeasurement"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_polygon" />
  </button>
  <button
    (click)="toggleCircleMeasurement()"
    [class.measurement-tools__button--active]="activeTool() === 'measure-circle'"
    class="measurement-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.circleMeasurement"
    [aria-label]="tooltipText.circleMeasurement"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_circle" />
  </button>
  <button
    (click)="toggleElevationProfileMeasurement()"
    [class.measurement-tools__button--active]="activeTool() === 'measure-elevation-profile'"
    class="measurement-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.elevationProfileMeasurement"
    [aria-label]="tooltipText.elevationProfileMeasurement"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_elevation" />
  </button>
</div>
