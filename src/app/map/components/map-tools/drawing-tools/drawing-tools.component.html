<div class="drawing-tools">
  <button
    (click)="openSettingsDialog()"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.settings"
    [aria-label]="tooltipText.settings"
    [disabled]="!!activeTool()"
  >
    <mat-icon svgIcon="ktzh_settings" />
  </button>
  <mat-divider class="drawing-tools__divider" />
  <button
    (click)="togglePointDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-point'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.pointDrawing"
    [aria-label]="tooltipText.pointDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_point" />
  </button>
  <button
    (click)="toggleLineDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-line'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.lineDrawing"
    [aria-label]="tooltipText.lineDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_line" />
  </button>
  <button
    (click)="togglePolygonDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-polygon'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.polygonDrawing"
    [aria-label]="tooltipText.polygonDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_polygon" />
  </button>
  <button
    (click)="toggleRectangleDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-rectangle'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.rectangleDrawing"
    [aria-label]="tooltipText.rectangleDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_rectangle" />
  </button>
  <button
    (click)="toggleCircleDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-circle'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.circleDrawing"
    [aria-label]="tooltipText.circleDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_circle" />
  </button>
  <button
    (click)="toggleTextDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-text'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.textDrawing"
    [aria-label]="tooltipText.textDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_text" />
  </button>
  <button
    (click)="toggleSymbolDrawing()"
    [class.drawing-tools__button--active]="activeTool() === 'draw-symbol'"
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.symbolDrawing"
    [aria-label]="tooltipText.symbolDrawing"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_symbol" />
  </button>
  <mat-divider class="drawing-tools__divider" />
  <button
    class="drawing-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.uploadDrawings"
    [aria-label]="tooltipText.uploadDrawings"
    (click)="openImportDrawingsDialog()"
    [disabled]="!!activeTool()"
  >
    <mat-icon svgIcon="ktzh_upload" />
  </button>
  <drawing-download-button />
</div>
