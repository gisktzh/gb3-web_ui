<div class="data-download-selection-tools">
  <button
    (click)="toggleCircleSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-circle'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.circleSelecting"
    [aria-label]="tooltipText.circleSelecting"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_circle" />
  </button>
  <button
    (click)="togglePolygonSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-polygon'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.polygonSelecting"
    [aria-label]="tooltipText.polygonSelecting"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_polygon" />
  </button>
  <button
    (click)="toggleRectangleSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-rectangle'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.rectangleSelecting"
    [aria-label]="tooltipText.rectangleSelecting"
  >
    <mat-icon svgIcon="ktzh_drawing_symbol_rectangle" />
  </button>
  <mat-divider class="data-download-selection-tools__divider" />
  <button
    (click)="toggleSectionSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-section'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.sectionSelecting"
    [aria-label]="tooltipText.sectionSelecting"
  >
    <mat-icon svgIcon="ktzh_select_section" />
  </button>
  <button
    (click)="toggleFederationSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-federation'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.federationSelecting"
    [aria-label]="tooltipText.federationSelecting"
  >
    <mat-icon svgIcon="ktzh_select_federation" />
  </button>
  <button
    (click)="toggleCantonSelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-canton'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.cantonSelecting"
    [aria-label]="tooltipText.cantonSelecting"
  >
    <mat-icon svgIcon="ktzh_select_canton" />
  </button>
  <button
    (click)="toggleMunicipalitySelecting()"
    [class.data-download-selection-tools__button--active]="activeTool() === 'select-municipality'"
    class="data-download-selection-tools__button"
    color="accent"
    mat-icon-button
    [matTooltip]="tooltipText.municipalitySelecting"
    [aria-label]="tooltipText.municipalitySelecting"
  >
    <mat-icon svgIcon="ktzh_select_municipality" />
  </button>
</div>
