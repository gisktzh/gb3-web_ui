<div class="map-tools-desktop">
  <div class="map-tools-desktop__list" typedTourAnchor="map.tools">
    <button
      (click)="toggleToolMenu('measurement')"
      [class.map-tools-desktop__list__button--active]="toolMenuVisibility() === 'measurement'"
      class="map-tools-desktop__list__button"
      color="accent"
      data-test-id="map-ruler"
      mat-icon-button
      [matTooltip]="tooltipText.measurement"
      [disabled]="!isMapReady()"
      [aria-label]="tooltipText.measurement"
    >
      <mat-icon svgIcon="ktzh_measure_menu" />
    </button>
    <mat-divider class="map-tools-desktop__list__divider" />
    <button
      (click)="toggleToolMenu('drawing')"
      [class.map-tools-desktop__list__button--active]="toolMenuVisibility() === 'drawing'"
      class="map-tools-desktop__list__button"
      color="accent"
      data-test-id="map-drawing"
      mat-icon-button
      [matTooltip]="tooltipText.drawing"
      [aria-label]="tooltipText.drawing"
      [disabled]="!isMapReady()"
    >
      <mat-icon svgIcon="ktzh_drawing_menu" />
    </button>
    <mat-divider class="map-tools-desktop__list__divider" />
    <button
      (click)="toggleToolMenu('data-download')"
      [class.map-tools-desktop__list__button--active]="toolMenuVisibility() === 'data-download'"
      class="map-tools-desktop__list__button"
      color="accent"
      data-test-id="map-data-download"
      mat-icon-button
      [matTooltip]="tooltipText.dataDownload"
      [aria-label]="tooltipText.dataDownload"
      [disabled]="!isMapReady()"
    >
      <mat-icon svgIcon="ktzh_download" />
    </button>
    <button
      (click)="showPrintDialog()"
      class="map-tools-desktop__list__button"
      data-test-id="map-print"
      mat-icon-button
      [matTooltip]="tooltipText.print"
      [aria-label]="tooltipText.print"
      [disabled]="!isMapReady()"
    >
      <mat-icon svgIcon="ktzh_print" />
    </button>
    <mat-divider class="map-tools-desktop__list__divider" />
    <button
      (click)="showShareLinkDialog()"
      class="map-tools-desktop__list__button"
      data-test-id="map-share"
      mat-icon-button
      [matTooltip]="tooltipText.share"
      [aria-label]="tooltipText.share"
      [disabled]="!isMapReady()"
    >
      <mat-icon svgIcon="ktzh_share" />
    </button>
    <mat-divider class="map-tools-desktop__list__divider" />
    <button
      (click)="showMapImportDialog()"
      class="map-tools-desktop__list__button"
      data-test-id="map-import"
      mat-icon-button
      [matTooltip]="tooltipText.mapImport"
      [aria-label]="tooltipText.mapImport"
      [disabled]="!isMapReady()"
    >
      <mat-icon svgIcon="ktzh_map_management" />
    </button>
  </div>
  @if (toolMenuVisibility() !== undefined; as toolMenuVisiblity) {
    <div class="map-tools-desktop__list" [attr.data-tool]="activeTool()">
      @if (toolMenuVisibility() === 'measurement') {
        <measurement-tools />
      }
      @if (toolMenuVisibility() === 'drawing') {
        <drawing-tools />
      }
      @if (toolMenuVisibility() === 'data-download') {
        <data-download-selection-tools />
      }
    </div>
  }
</div>
