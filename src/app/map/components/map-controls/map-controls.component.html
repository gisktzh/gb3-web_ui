<div class="map-controls">
  <div class="map-controls__inputs">
    <basemap-selector
      class="map-controls__inputs__basemap-selector"
      [class.map-controls__map-element--hidden]="mapUiState().hideUiElements"
    />
    <div class="map-controls__inputs__bottom">
      <scale-bar [class.map-controls__map-element--hidden]="mapUiState().hideUiElements" />
      <coordinate-scale-inputs
        class="map-controls__inputs__bottom__data-inputs"
        [class.map-controls__map-element--hidden]="mapUiState().hideUiElements"
      />
    </div>
  </div>
  <div class="map-controls__buttons">
    <zoom-controls class="map-controls__buttons__group" [showLocateMeButton]="true" />
    @if (screenMode() !== 'mobile') {
      <ui-toggle class="map-controls__buttons__group" />
    }
  </div>
</div>
