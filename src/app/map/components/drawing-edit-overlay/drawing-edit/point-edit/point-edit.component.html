<h3 class="ktzh-h3-medium ktzh-h3-medium--bold">Umrandung</h3>
<slider-edit [formField]="pointStyleForm.strokeWidth" [minValue]="1" [maxValue]="12" [step]="1" title="Strichstärke" />
<slider-edit [formField]="pointStyleForm.strokeOpacity" title="Deckkraft" />
<color-picker-edit [formField]="pointStyleForm.strokeColor" title="Strichfarbe" />
<mat-divider class="divider" />
<h3 class="ktzh-h3-medium ktzh-h3-medium--bold">Füllung</h3>
<slider-edit [formField]="pointStyleForm.fillOpacity" title="Deckkraft" />
<color-picker-edit [formField]="pointStyleForm.fillColor" title="Füllfarbe" />
<mat-divider class="divider" />

<h3 class="ktzh-h3-medium ktzh-h3-medium--bold">Grösse</h3>
<slider-edit [formField]="pointStyleForm.pointRadius" [minValue]="1" [maxValue]="50" [step]="1" title="Radius" />
