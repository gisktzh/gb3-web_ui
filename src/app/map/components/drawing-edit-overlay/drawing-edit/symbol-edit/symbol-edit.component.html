<drawing-symbols
  class="symbol-edit"
  groupName="symbols"
  [size]="symbolStyleForm.style.symbolSize().value()"
  (sizeChange)="symbolStyleForm.style.symbolSize().value.set($event)"
  [rotation]="symbolStyleForm.style.symbolRotation().value()"
  (rotationChange)="symbolStyleForm.style.symbolRotation().value.set($event)"
  [symbol]="symbolStyleForm.selectedSymbol().value()"
  (symbolChange)="symbolStyleForm.selectedSymbol().value.set($event)"
  [fullHeight]="true"
/>
