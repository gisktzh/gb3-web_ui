<!-- eslint-disable @angular-eslint/template/no-autofocus -- ESLint says it's an anti-pattern, but it has been implemented without autofocus. -->
<div
  class="search"
  [class.search--normal]="mode() === 'normal'"
  [class.search--mobile]="mode() === 'mobile'"
  [class.search--compact]="mode() === 'compact'"
>
  <div class="search__bar">
    <mat-icon class="search__bar__icon" svgIcon="ktzh_search" />
    <input
      #searchInput
      type="text"
      [(ngModel)]="searchTerm"
      class="search__bar__input"
      [class.search__bar__input--mobile]="screenMode() === 'mobile'"
      [placeholder]="placeholderText()"
      (focus)="focusEvent.emit()"
      [autofocus]="focusOnInit()"
      [disabled]="disabled()"
    />
    @if (showFilterButton() && (mode() === 'compact' || mode() === 'mobile')) {
      <button
        typedTourAnchor="map.search.filter"
        mat-icon-button
        (click)="openFilter()"
        [class.search__bar__filter-button--active]="isAnyFilterActive()"
        matTooltip="Suchresultate verfeinern"
        aria-label="Suchresultate verfeinern"
        [disabled]="disabled()"
      >
        <mat-icon svgIcon="ktzh_filter" />
      </button>
      <mat-divider [vertical]="true" class="search__bar__divider" />
    }

    @if (clearButtonLabel()) {
      <button
        mat-button
        (click)="clearInput()"
        class="search__bar__close-button"
        [disabled]="(!alwaysEnableClearButton() && searchTerm().length === 0) || disabled()"
        aria-label="Sucheingabe löschen"
      >
        {{ clearButtonLabel() }}
        <mat-icon>close</mat-icon>
      </button>
    } @else {
      <button
        mat-icon-button
        (click)="clearInput()"
        class="search__bar__close-icon-button"
        [disabled]="(!alwaysEnableClearButton() && searchTerm().length === 0) || disabled()"
        aria-label="Sucheingabe löschen"
      >
        @if (screenMode() === 'mobile') {
          <mat-icon>cancel</mat-icon>
        } @else {
          <mat-icon>close</mat-icon>
        }
      </button>
    }
  </div>
  @if (showFilterButton() && mode() === 'normal') {
    <button
      class="search__filter-button"
      mat-button
      (click)="openFilter()"
      [class.search__filter-button--active]="isAnyFilterActive()"
      [disabled]="disabled()"
    >
      Filter
    </button>
  }
</div>
