<a
  [href]="url()"
  class="external-link-button"
  [class.external-link-button--small]="size() === 'small'"
  [class.external-link-button--highlighted]="highlighted()"
  [color]="color() === 'primary' ? 'primary' : 'accent'"
  mat-icon-button
  [matTooltip]="toolTip() ?? ''"
  [matTooltipShowDelay]="0"
  rel="noopener noreferrer"
  target="_blank"
  clickOnSpaceBar
  [aria-label]="toolTip()"
  [tabIndex]="disableTabFocus() ? -1 : 0"
>
  <mat-icon svgIcon="ktzh_arrow_right" class="external-link-button__icon" />
</a>
