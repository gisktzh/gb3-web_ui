<page-section>
  <div class="data-catalogue-detail-page">
    <div class="data-catalogue-detail-page__content">
      <a
        [routerLink]="'/' + mainPageEnum.Data"
        class="data-catalogue-detail-page__back-button"
        [class.data-catalogue-detail-page__back-button--mobile]="screenMode() === 'mobile'"
        mat-button
      >
        <mat-icon svgIcon="ktzh_arrow_left" />
        Zur Übersicht
      </a>
      <div class="data-catalogue-detail-page__title" [class.data-catalogue-detail-page__title--mobile]="screenMode() === 'mobile'">
        @if (baseMetadataInformation().imageUrl; as imageUrl) {
          <a [href]="imageUrl.url.href">
            <img [src]="imageUrl.src.href" class="data-catalogue-detail-page__title__image" [alt]="imageUrl.alt" />
          </a>
        }
        <div>
          <h1 class="ktzh-h1-small-huge">{{ baseMetadataInformation().itemTitle }}</h1>
          @if (baseMetadataInformation().shortDescription; as shortDescription) {
            <p class="data-catalogue-detail-page__description mat-body" [innerHTML]="shortDescription | formatLineBreaks"></p>
          }
          <div class="data-catalogue-detail-page__category">
            <b class="data-catalogue-detail-page__category__title">Kategorie</b>
            <div class="data-catalogue-detail-page__category__content">
              <span class="data-catalogue-detail-page__category__content__pill">{{ baseMetadataInformation().category }}</span>
            </div>
          </div>
        </div>
      </div>

      <ng-content select="[topLink]" />
      <ng-content />
    </div>
  </div>
</page-section>
