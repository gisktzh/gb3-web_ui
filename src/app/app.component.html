<main class="app">
  @if (!isHeadlessPage() && !isSimplifiedPage()) {
    <skip-link [skipLinks]="skipLinks" (skipToLocationEvent)="skipToDomElement($event)" />
  }
  @if (screenMode() === 'mobile' && !isHeadlessPage() && !mapUiState().hideUiElements) {
    <navbar-mobile #navigation [id]="templateVariable.Navigation" />
  } @else if (!isHeadlessPage() && screenMode() !== 'mobile') {
    <navbar class="app__navbar" [isSimplifiedPage]="isSimplifiedPage()" #navigation [id]="templateVariable.Navigation" />
  }
  <article [class.app__headless-page]="isHeadlessPage()">
    <router-outlet #mainContent [id]="templateVariable.MainContent" />
    @if (!isHeadlessPage() && !isSimplifiedPage()) {
      <main-footer #footer [id]="templateVariable.Footer" />
    }
  </article>
  @if (scrollbarWidth() === undefined) {
    <scrollbar-width-calculation class="app__scrollbar-width-calculation" />
  }
</main>
