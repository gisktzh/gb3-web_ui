<div class="start-page">
  <page-section background="primary" [pageTitle]="true">
    <hero-header [heroText]="screenMode() === 'mobile' ? '' : heroText" heroTitle="Geoportal" />
  </page-section>

  <div class="start-page__search" [class.start-page__search--mobile]="screenMode() === 'mobile'">
    <start-page-search />
  </div>

  <page-section [hideBottomPadding]="true">
    <gis-browser-teaser />
  </page-section>

  <page-section sectionTitle="Häufig verwendet">
    <frequently-used-items />
  </page-section>

  <page-section background="accent" [titleLink]="externalNewsFeedLink" sectionTitle="News">
    <news-feed />
  </page-section>

  <page-section [hideBottomPadding]="true" sectionTitle="Karten entdecken">
    <discover-maps />
  </page-section>

  <page-section sectionTitle="Weiterführende Informationen">
    <link-list [linksGroups]="additionalInformationLinksGroups()" />
  </page-section>
</div>
