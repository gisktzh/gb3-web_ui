@if (map().gb2Url; as gb2Url) {
  <a
    matRipple
    class="search-result-entry-map"
    tabIndex="-1"
    [href]="gb2Url | appendMapConfigurationToUrl: mapConfigState()"
    rel="noopener noreferrer"
    target="_blank"
    [aria-label]="'Karte ' + map().title + ' öffnen.' + toolTip"
    [matTooltip]="gb2Url ? toolTip : ''"
  >
    <ng-container *ngTemplateOutlet="linkContent" />
  </a>
} @else {
  <a
    matRipple
    class="search-result-entry-map"
    tabIndex="-1"
    [queryParams]="{initialMapIds: map().id}"
    [routerLink]="['/', mainPageEnum.Maps]"
    data-test-id="open-active-map"
    [aria-label]="'Karte ' + map().title + ' öffnen.'"
  >
    <ng-container *ngTemplateOutlet="linkContent" />
  </a>
}
<ng-template #linkContent>
  <img [alt]="map().title" [src]="map().icon" class="search-result-entry-map__image" width="44" height="44" />
  <p class="search-result-entry-map__title" showTooltipIfTruncated [matTooltip]="map().title">{{ map().title }}</p>
  <mat-icon svgIcon="ktzh_arrow_right" class="search-result-entry-map__icon" [class.search-result-entry-map__icon--rotate]="map().gb2Url" />
</ng-template>
<mat-divider />
