@if (loadingState() === 'loading') {
  <p class="mat-body-2">
    {{ loadingText() ?? 'Lade Inhalt...' }}
    <mat-progress-bar mode="query" />
  </p>
}
@if (loadingState() === 'error') {
  <p class="mat-body-2">
    <strong>{{ loadingCompletedText() ?? 'Fehler beim Laden.' }}</strong>
    <mat-progress-bar mode="determinate" color="warn" />
  </p>
}
