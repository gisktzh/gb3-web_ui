services:
  gb3-frontend:
    restart: always
    ports:
      - 8081:8080
    environment:
      - TZ=Europe/Zurich
    build:
      context: ./
      args:
        TARGET_ENVIRONMENT: ${TARGET_ENV}
    image: gitlab.ktzh.ch:5050/gis/gb3-web_ui/gb3-frontend:${IMAGE_TAG:-latest}
    container_name: gb3-frontend
    volumes:
      - type: bind
        source: /var/log/nginx
        target: /var/log/nginx
    logging:
      options:
        max-size: '50m'
        max-file: '5'
