name: Run Quality Checks

on:
  workflow_call:
    inputs:
      cache_key:
        description: 'Cache key for coverage report'
        required: true
        type: string
      runner_version:
        required: true
        type: string
        description: 'Runner version to use for the job'

env:
  NODE_VERSION: '24'

jobs:
  lint:
    name: Run lint
    runs-on: ${{ inputs.runner_version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies and run linter
        run: |
          npm ci --ignore-scripts
          npm run lint

  knip:
    name: Run knip
    runs-on: ${{ inputs.runner_version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies and run knip
        run: |
          npm ci --ignore-scripts
          npm run knip

  tests:
    name: Run tests
    runs-on: ${{ inputs.runner_version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache coverage report
        uses: actions/cache@v5
        with:
          path: './coverage/gb3-frontend/lcov.info'
          key: ${{ inputs.cache_key }}

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts

      - name: Run tests
        run: |
          npm run test-ci
        env:
          # note: this is required with @arcgis/core >=4.32 due to increased memory usage for type checking
          NODE_OPTIONS: '--max-old-space-size=8192'

  e2e:
    name: Run end-to-end tests
    runs-on: ${{ inputs.runner_version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies and playwright browsers
        run: |
          npm ci --ignore-scripts
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            mesa-utils \
            libgl1-mesa-dri
          ./node_modules/.bin/playwright install --with-deps

      - name: Run tests
        run: |
          xvfb-run --auto-servernum npm run e2e
        env:
          LIBGL_ALWAYS_SOFTWARE: 1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
