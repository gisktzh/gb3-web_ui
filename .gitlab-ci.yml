stages:
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ''
  CA_CERTIFICATE: '$ZS_CERTIFICATE'
  WORK_DIR: gb3-web_ui

.build:
  image: docker:29.6.1
  stage: build
  tags: [docker]
  services:
    - name: docker:29.6.1-dind
      command:
        - /bin/sh
        - -c
        - echo "$CA_CERTIFICATE" > /usr/local/share/ca-certificates/proxyzs.crt && update-ca-certificates && dockerd-entrypoint.sh || exit
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - . scripts/pipeline/prepare_image_tag.sh
  script:
    - docker compose -f docker-compose.ktzh.yml build --pull
    - docker compose -f docker-compose.ktzh.yml push
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - when: never

build:staging:
  extends: .build
  variables:
    TARGET_ENV: staging

build:uat:
  extends: .build
  variables:
    TARGET_ENV: uat

# TODO: Comment in once config is set up
# build:production:
#   extends: .build
#   variables:
#     TARGET_ENV: production

.deploy:
  image: alpine:3.24
  stage: deploy
  tags: [docker]
  before_script:
    - . scripts/pipeline/prepare_ssh_key_for_target_env.sh
    - . scripts/pipeline/prepare_image_tag.sh
  script:
    - . scripts/pipeline/deploy_to_target_env.sh
  after_script:
    - rm -rf ~/.ssh
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never

deploy:staging:
  extends: .deploy
  variables:
    TARGET_ENV: staging
  needs:
    - build:staging

deploy:uat:
  extends: .deploy
  variables:
    TARGET_ENV: uat
  needs:
    - build:uat

